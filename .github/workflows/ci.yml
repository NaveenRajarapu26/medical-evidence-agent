name: Medical Evidence Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run basic import tests
      run: |
        python -c "from ingest.loader import load_document; print('loader OK')"
        python -c "from ingest.chunker import chunk_documents; print('chunker OK')"
        python -c "from retrieval.bm25 import BM25Retriever; print('BM25 OK')"
        python -c "from api.schemas import MedicalAnswer; print('schemas OK')"
        python -c "from agents.safety import check_query_safety; print('safety OK')"
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CHROMA_PERSIST_DIR: ./chroma_db
        LANGCHAIN_TRACING_V2: false
        OPENAI_API_KEY: dummy
        LANGCHAIN_API_KEY: dummy

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CHROMA_PERSIST_DIR: ./chroma_db
        LANGCHAIN_TRACING_V2: false
        OPENAI_API_KEY: dummy
        LANGCHAIN_API_KEY: dummy